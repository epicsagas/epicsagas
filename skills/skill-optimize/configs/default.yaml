# SkillOpt default configuration — token-efficient defaults.
#
# Token cost formula (approximate):
#   total_calls ≈ epochs × steps_per_epoch × (batch_size / minibatch_size)
#                 + epochs × use_slow_update × slow_update_samples × 2
#                 + epochs × use_meta_skill
#
# Cheapest run (--probe, defaults below):
#   1 epoch × ~4 steps × (8/4) = ~8 optimizer + ~32 target calls ≈ 40 calls
# Full run (4 epochs, slow_update=false):
#   4 × ~4 × 2 + baseline + test ≈ ~40 optimizer + ~128 target ≈ 170 calls
# Full run (4 epochs, slow_update=true):
#   + 3 × 20 × 2 = +120 target calls ≈ 290 calls

model:
  backend: claude
  optimizer_backend: claude_chat
  target_backend: claude_chat
  optimizer: claude-sonnet-4-6
  target: claude-sonnet-4-6
  reasoning_effort: medium
  claude_code_exec_path: claude
  claude_code_exec_profile: ""
  claude_code_exec_use_sdk: auto
  claude_code_exec_effort: medium
  claude_code_exec_max_thinking_tokens: 16384
  codex_trace_to_optimizer: true

train:
  num_epochs: 4
  train_size: 0
  batch_size: 8
  accumulation: 1
  seed: 42

gradient:
  minibatch_size: 4
  merge_batch_size: 4
  analyst_workers: 2
  max_analyst_rounds: 3
  failure_only: true              # skip success analysis → ~50% fewer reflect calls

optimizer:
  learning_rate: 4
  min_learning_rate: 2
  lr_scheduler: cosine            # edit budget decays over training
  lr_control_mode: fixed
  skill_update_mode: patch
  use_slow_update: false          # disable expensive epoch-boundary re-rollout (20×2 calls)
  slow_update_samples: 20
  longitudinal_pair_policy: mixed
  use_meta_skill: false           # skip meta-skill overhead (+1 optimizer call/epoch)

evaluation:
  use_gate: true
  sel_env_num: 0
  test_env_num: 0
  eval_test: true

# env-specific fields — override per environment
env:
  name: ""
  skill_init: ""
  split_mode: split_dir
  split_dir: ""
  workers: 4
  exec_timeout: 120
  max_completion_tokens: 4096
  out_root: ""                    # set to TARGET_DIR/.skillopt/outputs at runtime
