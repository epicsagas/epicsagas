_base_: ../_base_/default.yaml

model:
  backend: claude
  optimizer_backend: claude_chat
  target_backend: claude_chat
  optimizer: claude-sonnet-4-6
  target: claude-sonnet-4-6
  reasoning_effort: medium

train:
  batch_size: 8
  accumulation: 1
  num_epochs: 4

gradient:
  minibatch_size: 4
  merge_batch_size: 4
  analyst_workers: 2

optimizer:
  learning_rate: 4
  skill_update_mode: patch

evaluation:
  use_gate: true

# env-specific fields — override per environment
env:
  name: ""
  skill_init: ""
  split_mode: split_dir
  split_dir: ""
  workers: 4
  exec_timeout: 120
  max_completion_tokens: 4096
