name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate language stats SVG
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os

          token = os.environ["GH_TOKEN"]
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github+json"}

          def gh(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          repos, page = [], 1
          while True:
              batch = gh(f"https://api.github.com/user/repos?per_page=100&page={page}&affiliation=owner")
              if not batch:
                  break
              repos += [r for r in batch if not r["fork"]]
              if len(batch) < 100:
                  break
              page += 1

          IGNORE = {"html", "css", "makefile", "dockerfile", "shell", "powershell"}
          totals = {}
          for repo in repos:
              langs = gh(f"https://api.github.com/repos/{repo['full_name']}/languages")
              for lang, bytes_ in langs.items():
                  if lang.lower() not in IGNORE:
                      totals[lang] = totals.get(lang, 0) + bytes_

          top = sorted(totals.items(), key=lambda x: -x[1])[:8]
          grand = sum(v for _, v in top)

          COLORS = {
              "Rust": "#dea584", "TypeScript": "#3178c6", "Go": "#00ADD8",
              "Python": "#3572A5", "Dart": "#00B4AB", "Svelte": "#ff3e00",
              "JavaScript": "#f1e05a", "PHP": "#4F5D95", "Swift": "#F05138",
              "Kotlin": "#A97BFF", "C++": "#f34b7d", "C": "#555555", "Ruby": "#701516",
          }
          DEFAULT_COLOR = "#858585"

          W, H = 495, 220
          PAD = 25
          FONT = "Segoe UI, Ubuntu, Helvetica Neue, sans-serif"

          BAR_Y, BAR_H, BAR_W = 85, 8, W - PAD * 2

          bar_x = PAD
          bars = []
          for lang, bytes_ in top:
              pct = bytes_ / grand
              w = max(int(pct * BAR_W), 2)
              color = COLORS.get(lang, DEFAULT_COLOR)
              bars.append(f'<rect x="{bar_x}" y="{BAR_Y}" width="{w}" height="{BAR_H}" rx="2" fill="{color}"/>')
              bar_x += w + 1

          labels = []
          for i, (lang, bytes_) in enumerate(top):
              pct = bytes_ / grand
              color = COLORS.get(lang, DEFAULT_COLOR)
              col = i % 2
              row = i // 2
              lx = PAD + col * 230
              ly = 116 + row * 24
              labels.append(
                  f'<circle cx="{lx+5}" cy="{ly}" r="4" fill="{color}"/>'
                  f'<text x="{lx+16}" y="{ly+4}" font-size="11" fill="#a9b1d6" font-family="{FONT}">{lang}</text>'
                  f'<text x="{lx+220}" y="{ly+4}" font-size="11" fill="#a9b1d6" font-family="{FONT}" text-anchor="end">{pct*100:.1f}%</text>'
              )

          svg = f"""<svg width="{W}" height="{H}" xmlns="http://www.w3.org/2000/svg">
            <rect width="{W}" height="{H}" rx="5" fill="#1a1b27"/>
            <text x="{PAD}" y="38" font-size="15" font-weight="600" fill="#70a5fd" font-family="{FONT}">Top Languages by Repo</text>
            <text x="{PAD}" y="58" font-size="11" fill="#565f89" font-family="{FONT}">private repos included · forks excluded</text>
            {"".join(bars)}
            {"".join(labels)}
          </svg>"""

          with open("metrics-languages.svg", "w") as f:
              f.write(svg)

          print("Languages:", ", ".join(f"{l}({v/grand*100:.1f}%)" for l,v in top))
          EOF

      - name: Commit SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics-languages.svg
          git diff --cached --quiet || git commit -m "chore: update language metrics"
          git push
